<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GFIELD EDUCATION INSIGHT STUDIO</title>
<style>
:root{--bg:#f4f6fb;--ink:#101828;--muted:#667085;--line:#e5e7eb;--brand:#16417c;--deep:#101a34;--gold:#c79645;--card:#fff}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 0,#e8efff,transparent 32%),var(--bg);font-family:Pretendard,'Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif;color:var(--ink)}
.wrap{width:min(1280px,calc(100% - 28px));margin:auto;padding:24px 0 70px}.top{display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin-bottom:20px}.eyebrow{font-size:12px;font-weight:950;letter-spacing:2px;color:var(--brand)}h1{margin:8px 0;font-size:clamp(38px,6vw,70px);line-height:.96;letter-spacing:-1.5px}.lead{margin:0;color:var(--muted);line-height:1.7}.actions,.row{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:white;border-radius:999px;padding:11px 16px;font-weight:900;cursor:pointer;color:var(--ink)}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn.gold{background:var(--gold);border-color:var(--gold);color:#fff}.btn:active{transform:translateY(1px)}
.layout{display:grid;grid-template-columns:410px 1fr;gap:20px;align-items:start}.panel{background:var(--card);border:1px solid var(--line);border-radius:26px;box-shadow:0 18px 50px rgba(15,23,42,.10);padding:20px}.panel h2{margin:0 0 14px;font-size:20px}.field{margin-bottom:12px}label{display:block;margin-bottom:7px;font-size:12px;font-weight:950;color:#344054}input,select,textarea{width:100%;border:1px solid #d9dee8;border-radius:15px;padding:12px 13px;font:inherit;background:#fbfcfd;outline:none}textarea{resize:vertical;line-height:1.7}.source{min-height:280px}.code{min-height:310px;font-family:Consolas,monospace;font-size:13px}.summary{min-height:82px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.box{border:1px solid #edf0f5;border-radius:18px;padding:12px;background:#fbfcff}.hint{margin:10px 0 0;color:var(--muted);font-size:12px;line-height:1.65}.preview-grid{display:grid;grid-template-columns:360px 1fr;gap:18px;margin-bottom:18px}.thumb{position:relative;aspect-ratio:16/9;border-radius:20px;overflow:hidden;background:linear-gradient(135deg,#101a34,#16417c 58%,#c79645);color:white;display:flex;flex-direction:column;justify-content:space-between;padding:18px}.thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.thumb.has-img:after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(16,26,52,.10),rgba(16,26,52,.76))}.thumb>*{position:relative;z-index:1}.new{position:absolute;right:14px;top:14px;background:#ff4d4f;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:950;z-index:2}.thumb-title{font-size:24px;font-weight:950;line-height:1.18;letter-spacing:-.6px}.thumb-cat{display:inline-flex;width:max-content;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.preview{min-height:480px;border:1px dashed #cbd5e1;border-radius:22px;background:#f8fafc;padding:12px}.preview iframe{width:100%;height:610px;border:0;border-radius:16px;background:white}.tabs{display:flex;gap:8px;margin-bottom:12px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-weight:900;cursor:pointer}.tab.active{background:var(--deep);color:#fff}.pane{display:none}.pane.active{display:block}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:#fff;border-radius:999px;padding:12px 18px;font-weight:900;display:none;z-index:20}.toast.show{display:block}@media(max-width:1100px){.layout,.preview-grid{grid-template-columns:1fr}.top{display:block}.actions{margin-top:14px}}@media(max-width:640px){.two{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="wrap">
<header class="top">
<div><div class="eyebrow">GFIELD EDUCATION INSIGHT STUDIO</div><h1>교육 인사이트<br>제작기</h1><p class="lead">검색한 교육 자료를 붙여넣고 AI로 취합·해석한 뒤 썸네일, 미리보기, HTML 소스, 게시 데이터를 한 화면에서 관리합니다.</p></div>
<nav class="actions"><button class="btn" id="btnHealth">API 확인</button><button class="btn" id="btnClear">초기화</button><button class="btn primary" id="btnGenerate">교육 인사이트 생성</button><button class="btn gold" id="btnPublish">게시판에 반영</button></nav>
</header>
<section class="layout">
<aside class="panel"><h2>입력·설정</h2>
<div class="field"><label>제목</label><input id="title" placeholder="예: AI 시대의 초등 수학 학습 변화"></div>
<div class="field"><label>검색 키워드</label><input id="searchKeyword" placeholder="예: AI 초등 수학 교육 변화"></div>
<div class="row field"><button class="btn" id="btnSearch">자료 검색 시작</button><button class="btn" id="btnNotebook">NotebookLM용 자료 정리</button></div>
<div class="two"><div class="field"><label>카테고리</label><select id="category"><option>교육정책</option><option>입시/진학</option><option>학습법</option><option>에듀테크/AI</option><option>수학·사고력</option><option>학원가 이슈</option></select></div><div class="field"><label>형식</label><select id="tone"><option>인사이트형</option><option>칼럼형</option><option>블로그형</option><option>잡지형</option></select></div></div>
<div class="field"><label>출처/참고 링크</label><input id="sourceUrl" placeholder="기사, 보고서, 이미지 출처 등"></div>
<div class="field"><label>썸네일 이미지 URL</label><input id="imageUrl" placeholder="없으면 자동 카드 썸네일 생성"></div>
<div class="box field"><label>추가 옵션</label><label><input id="optImage" type="checkbox" checked> 이미지 제안</label> <label><input id="optTable" type="checkbox" checked> 표/비교표</label> <label><input id="optGraph" type="checkbox"> 그래프 설명</label> <label><input id="optSource" type="checkbox" checked> 출처 정리</label></div>
<div class="field"><label>자료 붙여넣기</label><textarea id="source" class="source" placeholder="구글/뉴스/보고서/블로그에서 찾은 교육 자료를 붙여넣으세요. 여러 자료를 이어 붙여도 됩니다."></textarea></div>
<div class="row"><button class="btn primary" id="btnGenerate2">생성</button><button class="btn" id="btnBasic">기본 HTML</button></div>
<p class="hint" id="apiState">API 상태: 확인 전</p>
</aside>
<section>
<div class="preview-grid"><div class="panel"><h2>카드형 썸네일</h2><div class="thumb" id="thumbPreview"><span class="new">NEW</span><div>GFIELD EDUCATION INSIGHT</div><div><div class="thumb-title" id="thumbTitle">교육 인사이트 제목</div><div class="thumb-cat" id="thumbCategory">교육정책</div></div></div></div><div class="panel"><h2>본문 미리보기</h2><div class="preview" id="preview">미리보기 영역</div></div></div>
<div class="panel"><div class="tabs"><button class="tab active" id="tabSource">HTML 소스</button><button class="tab" id="tabPost">게시 데이터</button></div><div class="pane active" id="paneSource"><textarea id="htmlSource" class="code"></textarea><div class="row" style="margin-top:10px"><button class="btn" id="btnRefresh">미리보기 갱신</button><button class="btn" id="btnCopySource">소스 복사</button><button class="btn" id="btnDownload">HTML 다운로드</button></div></div><div class="pane" id="panePost"><textarea id="postData" class="code"></textarea><div class="row" style="margin-top:10px"><button class="btn" id="btnCopyPost">게시 데이터 복사</button></div></div><div class="field" style="margin-top:14px"><label>카드 요약</label><textarea id="summary" class="summary"></textarea></div></div>
</section>
</section>
</main>
<div class="toast" id="toast"></div>
<script>
(() => {
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzm1s1EEF2Mzcqc-kUFFilmfWN2PmbHgqAIdKmV9NfA-Z5rZ7sYXoTZeBANVJYVr5U4qg/exec';
  const TOKEN = 'gfield7772';
  const API = '/api/gemini';
  const HEALTH = '/api/health';
  const $ = id => document.getElementById(id);
  const val = id => ($(id)?.value || '').trim();
  const setVal = (id, v) => { const el=$(id); if(el) el.value=v; };
  function esc(v){return String(v||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
  function msg(t){const x=$('toast'); if(!x){alert(t);return;} x.textContent=t; x.classList.add('show'); clearTimeout(x._t); x._t=setTimeout(()=>x.classList.remove('show'),2600);}
  function optionText(){const a=[]; if($('optImage').checked)a.push('이미지 제안 최소 2개'); if($('optTable').checked)a.push('필요 시 표 또는 비교표'); if($('optGraph').checked)a.push('그래프/도표 설명'); if($('optSource').checked)a.push('출처 정리'); return a.join(', ');}
  function fmt(body){return esc(body).replace(/\[강조\]([\s\S]*?)\[\/강조\]/g,'<mark>$1</mark>').replace(/\n/g,'<br>');}
  function article(title, body, tone){return `<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(title)}</title><style>body{margin:0;background:#f4f6fb;color:#111827;font-family:Pretendard,Apple SD Gothic Neo,Noto Sans KR,sans-serif}.page{width:min(920px,calc(100% - 28px));margin:auto;padding:44px 0}.article{background:#fff;border-radius:30px;box-shadow:0 22px 70px rgba(15,23,42,.12);overflow:hidden}.hero{padding:42px;background:linear-gradient(135deg,#101a34,#16417c);color:white}.eyebrow{font-size:12px;font-weight:950;letter-spacing:2px;color:#dbeafe}.hero h1{margin:12px 0 12px;font-size:clamp(34px,6vw,64px);line-height:1.02}.tag{display:inline-block;border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:8px 12px;font-weight:900}.body{padding:36px;font-size:17px;line-height:1.9}.body mark{background:#fff2a8;padding:2px 5px;border-radius:6px;font-weight:850}</style></head><body><main class="page"><article class="article"><section class="hero"><div class="eyebrow">GFIELD EDUCATION INSIGHT</div><h1>${esc(title)}</h1><span class="tag">${esc(tone)}</span></section><section class="body">${fmt(body)}</section></article></main></body></html>`;}
  function makeSummary(t){return String(t||'').replace(/[#*_`\[\]]/g,'').replace(/\n+/g,' ').slice(0,150);}
  function showPane(n){$('tabSource').classList.toggle('active',n==='source');$('tabPost').classList.toggle('active',n==='post');$('paneSource').classList.toggle('active',n==='source');$('panePost').classList.toggle('active',n==='post');}
  function refreshPreview(){const html=val('htmlSource'); $('preview').innerHTML = html ? '<iframe srcdoc="'+esc(html)+'"></iframe>' : '미리보기 영역';}
  function updateThumb(){$('thumbTitle').textContent=val('title')||'교육 인사이트 제목'; $('thumbCategory').textContent=val('category')||'교육정책'; const box=$('thumbPreview'); box.querySelectorAll('img').forEach(x=>x.remove()); box.classList.remove('has-img'); const url=val('imageUrl'); if(url){const img=new Image(); img.src=url; img.onload=()=>{box.prepend(img); box.classList.add('has-img');};}}
  async function checkHealth(){try{const r=await fetch(HEALTH); const d=await r.json(); $('apiState').innerHTML=d.ok?'<b style="color:#067647">API 상태: 정상</b>':'<b style="color:#b42318">API 상태: 오류</b>';}catch(e){$('apiState').innerHTML='<b style="color:#b42318">API 상태: 연결 실패</b>';}}
  function openSearch(){const raw=val('searchKeyword')||val('title')||'교육 트렌드'; const q=encodeURIComponent(raw); ['https://www.google.com/search?q='+q,'https://news.google.com/search?q='+q+'&hl=ko&gl=KR&ceid=KR:ko','https://www.google.com/search?q='+q+'+site:moe.go.kr'].forEach(u=>window.open(u,'_blank')); msg('검색 창을 열었습니다.');}
  function notebook(){const t=val('title')||'교육 자료 분석'; const s=val('source'); if(!s){msg('먼저 자료를 붙여넣어주세요.'); return;} setVal('source',`[NotebookLM용 자료 정리]\n\n주제:\n${t}\n\n아래 자료를 NotebookLM에 넣기 좋은 형태로 정리해줘.\n\n정리 방식:\n1. 출처별 핵심 요약\n2. 공통으로 반복되는 핵심 흐름\n3. 서로 다른 주장이나 관점\n4. 교육 현장/학부모 관점의 시사점\n5. 추가로 확인해야 할 질문 5개\n6. 인사이트 매거진 글로 발전시킬 수 있는 제목 후보 5개\n\n원자료:\n${s}`); msg('NotebookLM용 정리 프롬프트로 바꿨습니다.');}
  function basic(){const t=val('title')||'교육 인사이트 브리핑'; const b=val('source')||'자료를 입력해주세요.'; const tone=val('tone')||'인사이트형'; setVal('htmlSource', article(t,b,tone)); if(!val('summary')) setVal('summary', makeSummary(b)); refreshPreview(); updateThumb(); msg('기본 HTML 생성 완료');}
  async function generate(){const t=val('title')||'교육 인사이트 브리핑'; const s=val('source'); if(!s){msg('자료를 붙여넣어주세요.'); return;} msg('AI가 자료를 취합·해석하는 중'); try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t,tone:val('tone')||'인사이트형',source:s+'\n\n추가 옵션: '+optionText()})}); const d=await r.json(); if(!d.ok) throw new Error(d.error||'AI 호출 실패'); const text=d.text||s; setVal('htmlSource',article(t,text,val('tone')||'인사이트형')); if(!val('summary')) setVal('summary',makeSummary(text)); refreshPreview(); updateThumb(); msg('생성 완료');}catch(e){msg('AI 호출 실패: '+e.message);}}
  async function publish(){const html=val('htmlSource'); if(!html){msg('먼저 HTML을 생성해주세요.'); return;} const post={action:'publishPost',token:TOKEN,title:val('title'),category:val('category'),tone:val('tone'),summary:val('summary'),imageUrl:val('imageUrl'),sourceUrl:val('sourceUrl'),html,createdAt:new Date().toISOString(),isNew:true}; setVal('postData',JSON.stringify(post,null,2)); showPane('post'); msg('Google Drive에 게시 요청 중'); try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(post)}); msg('게시 요청 완료. 시트를 확인하세요.');}catch(e){msg('게시 요청 실패: '+e.message);}}
  function clearAll(){['title','searchKeyword','source','summary','sourceUrl','imageUrl','htmlSource','postData'].forEach(id=>setVal(id,'')); $('preview').textContent='미리보기 영역'; updateThumb(); msg('초기화 완료');}
  function copy(id){navigator.clipboard.writeText(val(id)); msg('복사 완료');}
  function download(){const blob=new Blob([val('htmlSource')],{type:'text/html;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(val('title')||'gfield-insight')+'.html'; a.click(); URL.revokeObjectURL(a.href);}
  document.addEventListener('DOMContentLoaded',()=>{ $('btnHealth').onclick=checkHealth; $('btnClear').onclick=clearAll; $('btnGenerate').onclick=generate; $('btnGenerate2').onclick=generate; $('btnPublish').onclick=publish; $('btnSearch').onclick=openSearch; $('btnNotebook').onclick=notebook; $('btnBasic').onclick=basic; $('btnRefresh').onclick=refreshPreview; $('btnCopySource').onclick=()=>copy('htmlSource'); $('btnCopyPost').onclick=()=>copy('postData'); $('btnDownload').onclick=download; $('tabSource').onclick=()=>showPane('source'); $('tabPost').onclick=()=>showPane('post'); ['title','category','imageUrl'].forEach(id=>$(id).addEventListener('input',updateThumb)); updateThumb(); });
})();
</script>
</body>
</html>
