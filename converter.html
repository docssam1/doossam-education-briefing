<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GFIELD 매거진 변환기</title><style>*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#111827;font-family:Pretendard,Apple SD Gothic Neo,Noto Sans KR,sans-serif}.wrap{width:min(1160px,calc(100% - 28px));margin:auto;padding:34px 0 70px}.hero,.box{background:white;border:1px solid #dbe3ef;border-radius:26px;box-shadow:0 20px 55px rgba(15,23,42,.1)}.hero{padding:34px;background:linear-gradient(135deg,#fff,#eef4ff)}.eyebrow{font-size:12px;font-weight:950;letter-spacing:2px;color:#16417c}h1{margin:10px 0 12px;font-size:clamp(38px,6vw,72px);line-height:.96;letter-spacing:-1.6px}.lead{color:#64748b;line-height:1.8}.grid{display:grid;grid-template-columns:.95fr 1.05fr;gap:22px;margin-top:22px}.box{padding:22px}label{display:block;margin:12px 0 7px;font-size:12px;font-weight:900;color:#334155}input,select,textarea{width:100%;border:1px solid #d7dfeb;border-radius:15px;padding:13px 14px;font:inherit;background:#fbfdff}textarea{min-height:190px;line-height:1.7;resize:vertical}.code{min-height:430px;font-family:Consolas,monospace;font-size:13px}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.btn{border:1px solid #dbe3ef;border-radius:999px;padding:12px 17px;background:white;font-weight:950;cursor:pointer;text-decoration:none;color:#111827}.primary{background:#16417c;border-color:#16417c;color:white}.purple{background:#6d5dfc;border-color:#6d5dfc;color:white}.preview{margin-top:14px;min-height:300px;border:1px dashed #cbd5e1;border-radius:18px;padding:14px;background:#f8fafc}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:white;border-radius:999px;padding:12px 18px;font-weight:900;display:none}.show{display:block}@media(max-width:900px){.grid{grid-template-columns:1fr}.wrap{width:min(100% - 20px,1160px);padding-top:18px}}</style></head><body><main class="wrap"><section class="hero"><div class="eyebrow">GFIELD CONTENT STUDIO</div><h1>교육 브리핑<br>매거진 변환기</h1><p class="lead">VPN 안 서버 API를 호출해 원고를 지필드 스타일 HTML 매거진으로 변환합니다. API 키는 브라우저에 저장하지 않습니다.</p></section><section class="grid"><div class="box"><h2>원고 입력</h2><label>서버 API 주소</label><input id="api" placeholder="예: http://185.238.241.138:8787/api/gemini"><label>제목</label><input id="title" placeholder="예: 2026 대치동 교육 흐름 브리핑"><label>스타일</label><select id="tone"><option>학부모 안내형</option><option>전문 칼럼형</option><option>뉴스 브리핑형</option><option>상담 유도형</option></select><label>원고</label><textarea id="src" placeholder="변환할 내용을 붙여넣으세요."></textarea><div class="row"><button class="btn primary" onclick="basic()">기본 HTML 만들기</button><button class="btn purple" onclick="ai()">서버 AI로 다듬기</button><button class="btn" onclick="copyOut()">HTML 복사</button></div></div><div class="box"><h2>결과 HTML</h2><textarea id="out" class="code"></textarea><div class="row"><button class="btn" onclick="preview()">미리보기</button><a class="btn primary" href="./html-storage.html" target="_blank">HTML 저장소 열기</a><a class="btn" href="./index.html" target="_blank">게시판 보기</a></div><div id="pv" class="preview">미리보기 영역</div></div></section></main><div id="toast" class="toast"></div><script>const D='http://185.238.241.138:8787/api/gemini';const $=id=>document.getElementById(id);$('api').value=localStorage.getItem('gfield_api')||D;function e(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function msg(t){$('toast').textContent=t;$('toast').classList.add('show');clearTimeout($('toast')._t);$('toast')._t=setTimeout(()=>$('toast').classList.remove('show'),2200)}function mag(title,body,tone){return `<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${e(title)}</title><style>body{margin:0;background:#f5f7fb;color:#111827;font-family:Pretendard,Apple SD Gothic Neo,Noto Sans KR,sans-serif}.page{width:min(860px,calc(100% - 28px));margin:auto;padding:44px 0}.card{background:white;border-radius:28px;box-shadow:0 22px 60px rgba(15,23,42,.12);overflow:hidden}.hero{padding:42px;background:linear-gradient(135deg,#16417c,#6d5dfc);color:white}.eyebrow{font-size:12px;font-weight:900;letter-spacing:2px}.hero h1{margin:12px 0 0;font-size:clamp(32px,6vw,58px);line-height:1.05}.tag{display:inline-block;margin-top:18px;border:1px solid rgba(255,255,255,.4);border-radius:999px;padding:8px 13px;font-weight:800}.body{padding:34px;font-size:17px;line-height:1.9;white-space:pre-wrap}</style></head><body><main class="page"><article class="card"><section class="hero"><div class="eyebrow">GFIELD EDUCATION BRIEFING</div><h1>${e(title)}</h1><div class="tag">${e(tone)}</div></section><section class="body">${e(body)}</section></article></main></body></html>`}function title(){return $('title').value.trim()||'GFIELD 교육 브리핑'}function basic(){const body=$('src').value.trim()||'내용을 입력해주세요.';$('out').value=mag(title(),body,$('tone').value);preview();msg('기본 HTML 생성 완료')}async function ai(){const api=$('api').value.trim();const src=$('src').value.trim();if(!api||!src){msg('API 주소와 원고가 필요합니다');return}localStorage.setItem('gfield_api',api);msg('서버 AI 요청 중');try{const r=await fetch(api,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:title(),tone:$('tone').value,source:src,prompt:'학부모용 교육 브리핑 문체로 정리하고 과장 없이 전문적으로 작성'})});const data=await r.json();const text=data.html?data.html:(data.text||data.result||data.content||src);$('out').value=data.html?text:mag(title(),text,$('tone').value);preview();msg('서버 AI 변환 완료')}catch(err){msg('서버 API 호출 실패. VPN/CORS/API 주소 확인')}}function preview(){const html=$('out').value;if(!html){msg('결과 HTML이 없습니다');return}$('pv').innerHTML='<iframe style="width:100%;height:520px;border:0;background:white;border-radius:14px" srcdoc="'+e(html)+'"></iframe>'}async function copyOut(){if(!$('out').value){msg('복사할 HTML이 없습니다');return}await navigator.clipboard.writeText($('out').value);msg('HTML 복사 완료')}</script></body></html>
