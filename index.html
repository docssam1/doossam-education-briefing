<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>doossam의 교육 브리핑</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --paper: #ffffff;
      --ink: #111827;
      --muted: #64748b;
      --line: #e5e7eb;
      --brand: #155e75;
      --brand2: #0f766e;
      --soft: #ecfeff;
      --shadow: 0 18px 50px rgba(15, 23, 42, .10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }
    a { color: inherit; }
    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 76px;
    }
    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      padding: 42px 0 28px;
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      font-size: 12px;
      font-weight: 950;
      color: var(--brand);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: clamp(40px, 7vw, 88px);
      line-height: .92;
      font-weight: 950;
      letter-spacing: -1.5px;
    }
    .lead {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
      max-width: 680px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn {
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(15, 23, 42, .04);
    }
    .btn.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
    }
    .feed {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-top: 28px;
    }
    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }
    .thumb {
      aspect-ratio: 1 / .78;
      background:
        linear-gradient(135deg, rgba(21,94,117,.18), rgba(15,118,110,.06)),
        radial-gradient(circle at 25% 20%, rgba(255,255,255,.9), transparent 35%),
        #eaf7f7;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--brand);
      font-size: 15px;
      font-weight: 950;
      text-align: center;
      padding: 18px;
      line-height: 1.5;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-body {
      padding: 18px;
      display: flex;
      flex: 1;
      flex-direction: column;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .badge {
      color: var(--brand);
      background: var(--soft);
      border: 1px solid #cffafe;
      border-radius: 999px;
      padding: 4px 9px;
      white-space: nowrap;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.35;
      letter-spacing: -.4px;
    }
    .summary {
      margin: 0;
      color: #475569;
      font-size: 14px;
      line-height: 1.75;
      flex: 1;
    }
    .read {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      width: fit-content;
      color: var(--brand);
      font-weight: 950;
      font-size: 13px;
      text-decoration: none;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }
    .empty {
      grid-column: 1 / -1;
      padding: 44px 20px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed #cbd5e1;
      border-radius: 22px;
      background: #fff;
      line-height: 1.8;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .58);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      z-index: 50;
    }
    .modal.open { display: flex; }
    .modal-card {
      width: min(760px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: white;
      border-radius: 26px;
      box-shadow: 0 30px 90px rgba(0,0,0,.25);
    }
    .modal-hero {
      min-height: 220px;
      background: linear-gradient(135deg, #164e63, #0f766e);
      color: white;
      padding: 34px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .modal-hero h2 {
      margin: 0;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1.08;
    }
    .modal-content {
      padding: 28px 34px 34px;
      line-height: 1.9;
      color: #334155;
      white-space: pre-wrap;
    }
    .modal-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .state {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: #111827;
      color: white;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 800;
      display: none;
      z-index: 80;
    }
    .state.show { display: block; }
    @media (max-width: 980px) {
      .top { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .feed { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .shell { width: min(100% - 22px, 1120px); padding-top: 14px; }
      .feed { grid-template-columns: 1fr; }
      .modal-content, .modal-hero { padding-left: 22px; padding-right: 22px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="top">
      <div>
        <div class="eyebrow">doossam education briefing</div>
        <h1>doossam의<br>교육 브리핑</h1>
        <p class="lead">입시, 교육 정책, 학원가 흐름을 짧고 선명하게 모아두는 공개 칼럼 보드입니다.</p>
      </div>
      <nav class="actions">
        <button class="btn" type="button" onclick="loadPosts()">새로고침</button>
        <a class="btn primary" href="./admin.html">관리자</a>
      </nav>
    </header>

    <section class="feed" id="feed"></section>
  </main>

  <div class="modal" id="modal" onclick="closeModal(event)">
    <article class="modal-card">
      <div class="modal-hero">
        <div class="eyebrow" id="modalCategory" style="color:#a7f3d0">education briefing</div>
        <h2 id="modalTitle"></h2>
      </div>
      <div class="modal-content">
        <div id="modalBody"></div>
        <div class="modal-links" id="modalLinks"></div>
      </div>
    </article>
  </div>
  <div class="state" id="state"></div>

  <script>
    const APPS_SCRIPT_URL = "";
    const samplePosts = [
      {
        id: "sample-1",
        createdAt: new Date().toISOString(),
        title: "이번 주 교육 브리핑 샘플",
        category: "교육 브리핑",
        summary: "Apps Script URL을 연결하면 Google Sheet에 저장된 실제 칼럼이 이곳에 표시됩니다.",
        body: "관리자 화면에서 게시글을 등록하고, HTML 저장소에서 매거진 결과물을 Drive에 저장하면 공개 게시판에 카드로 노출됩니다.",
        imageUrl: "",
        sourceUrl: ""
      }
    ];
    let posts = [];

    function getApiUrl() {
      return (localStorage.getItem("briefing_api_url") || APPS_SCRIPT_URL || "").trim();
    }

    function loadPosts() {
      const url = getApiUrl();
      if (!url) {
        posts = samplePosts;
        renderPosts();
        return;
      }
      showState("불러오는 중입니다");
      const callback = "briefingCallback_" + Date.now();
      window[callback] = function(data) {
        delete window[callback];
        script.remove();
        hideState();
        if (data && data.ok) {
          posts = data.posts || [];
          renderPosts();
        } else {
          showState("목록을 불러오지 못했습니다");
        }
      };
      const script = document.createElement("script");
      script.src = url + "?action=listPosts&callback=" + callback;
      script.onerror = function() {
        delete window[callback];
        showState("Apps Script URL을 확인해주세요");
      };
      document.body.appendChild(script);
    }

    function renderPosts() {
      const feed = document.getElementById("feed");
      if (!posts.length) {
        feed.innerHTML = '<div class="empty">아직 공개된 브리핑이 없습니다.</div>';
        return;
      }
      feed.innerHTML = posts.map((post, index) => cardTemplate(post, index)).join("");
    }

    function cardTemplate(post, index) {
      const image = post.imageUrl
        ? '<img src="' + escapeAttr(post.imageUrl) + '" alt="">'
        : '<span>' + escapeHtml(post.category || "교육 브리핑") + '<br>doossam briefing</span>';
      return [
        '<article class="card">',
        '  <div class="thumb">' + image + '</div>',
        '  <div class="card-body">',
        '    <div class="meta"><span class="badge">' + escapeHtml(post.category || "교육 브리핑") + '</span><span>' + formatDate(post.createdAt) + '</span></div>',
        '    <h2>' + escapeHtml(post.title) + '</h2>',
        '    <p class="summary">' + escapeHtml(post.summary || "") + '</p>',
        '    <button class="read" type="button" onclick="openPost(' + index + ')">이전 칼럼 보기</button>',
        '  </div>',
        '</article>'
      ].join("");
    }

    function openPost(index) {
      const post = posts[index];
      if (!post) return;
      document.getElementById("modalCategory").textContent = post.category || "교육 브리핑";
      document.getElementById("modalTitle").textContent = post.title || "";
      document.getElementById("modalBody").textContent = post.body || post.summary || "";
      const links = [];
      if (post.htmlFileId) {
        links.push('<a class="btn primary" href="./html-viewer.html?id=' + encodeURIComponent(post.htmlFileId) + '" target="_blank" rel="noopener">저장된 HTML 열기</a>');
      }
      if (post.sourceUrl) {
        links.push('<a class="btn" href="' + escapeAttr(post.sourceUrl) + '" target="_blank" rel="noopener">출처 보기</a>');
      }
      document.getElementById("modalLinks").innerHTML = links.join("");
      document.getElementById("modal").classList.add("open");
    }

    function closeModal(event) {
      if (event.target.id === "modal") {
        document.getElementById("modal").classList.remove("open");
      }
    }

    function showState(message) {
      const state = document.getElementById("state");
      state.textContent = message;
      state.classList.add("show");
      clearTimeout(state._timer);
      state._timer = setTimeout(hideState, 2600);
    }

    function hideState() {
      document.getElementById("state").classList.remove("show");
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleDateString("ko-KR", { month: "short", day: "numeric" });
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    loadPosts();
  </script>
</body>
</html>
