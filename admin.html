<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GFIELD INSIGHT STUDIO</title>
  <style>
    :root{--bg:#f4f6fb;--paper:#fff;--ink:#101828;--muted:#667085;--line:#e5e7eb;--brand:#16417c;--deep:#101a34;--gold:#c79645;--soft:#eef4ff;--danger:#dc2626;--shadow:0 18px 50px rgba(15,23,42,.10)}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 0,#e7edff,transparent 30%),var(--bg);color:var(--ink);font-family:Pretendard,'Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif}.wrap{width:min(1280px,calc(100% - 28px));margin:auto;padding:24px 0 70px}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;margin-bottom:20px}.eyebrow{font-size:12px;font-weight:950;letter-spacing:2px;color:var(--brand);text-transform:uppercase}.top h1{margin:9px 0 9px;font-size:clamp(38px,6vw,72px);line-height:.95;letter-spacing:-1.5px}.lead{margin:0;color:var(--muted);line-height:1.7}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:11px 16px;font-weight:900;cursor:pointer;text-decoration:none;color:var(--ink);box-shadow:0 8px 20px rgba(15,23,42,.04)}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn.gold{background:var(--gold);border-color:var(--gold);color:#fff}.btn.ghost{background:#f8fafc}.layout{display:grid;grid-template-columns:390px 1fr;gap:20px;align-items:start}.panel{background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);padding:20px}.panel h2{margin:0 0 14px;font-size:19px}.field{margin-bottom:12px}label{display:block;margin-bottom:7px;color:#344054;font-size:12px;font-weight:950}input,select,textarea{width:100%;border:1px solid #d9dee8;border-radius:15px;padding:12px 13px;font:inherit;background:#fbfcfd;color:var(--ink);outline:none}textarea{line-height:1.7;resize:vertical}.source{min-height:270px}.code{min-height:300px;font-family:Consolas,monospace;font-size:13px}.summary{min-height:84px}input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(22,65,124,.10);background:#fff}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row{display:flex;gap:10px;flex-wrap:wrap}.hint{margin:9px 0 0;color:var(--muted);font-size:12px;line-height:1.65}.studio{display:grid;gap:18px}.preview-grid{display:grid;grid-template-columns:360px 1fr;gap:18px}.thumb-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px}.thumb-preview{position:relative;aspect-ratio:16/9;border-radius:20px;overflow:hidden;border:1px solid #dbe3ef;background:linear-gradient(135deg,#101a34,#16417c 60%,#c79645);color:#fff;display:flex;flex-direction:column;justify-content:space-between;padding:18px}.thumb-preview img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.thumb-preview.has-img:after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(16,26,52,.15),rgba(16,26,52,.72))}.thumb-inner{position:relative;z-index:1}.thumb-kicker{font-size:11px;font-weight:950;letter-spacing:1.4px;opacity:.9}.thumb-title{font-size:24px;line-height:1.18;font-weight:950;letter-spacing:-.7px}.thumb-category{display:inline-flex;width:max-content;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.thumb-new{position:absolute;right:14px;top:14px;z-index:2;background:#ff4d4f;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:950}.article-preview{min-height:480px;border:1px dashed #cbd5e1;border-radius:22px;background:#f8fafc;padding:12px}.article-preview iframe{width:100%;height:610px;border:0;border-radius:16px;background:white}.tabs{display:flex;gap:8px;margin-bottom:12px}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-weight:900;cursor:pointer;color:#475467}.tab.active{background:var(--deep);border-color:var(--deep);color:#fff}.pane{display:none}.pane.active{display:block}.option-box{border:1px solid #edf0f5;border-radius:18px;padding:12px;background:#fbfcff}.check-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check{display:flex;gap:7px;align-items:center;font-size:13px;font-weight:800;color:#475467}.check input{width:auto}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:white;border-radius:999px;padding:12px 18px;font-weight:900;display:none;z-index:80}.toast.show{display:block}@media(max-width:1100px){.layout,.preview-grid{grid-template-columns:1fr}.top{display:block}.actions{justify-content:flex-start;margin-top:14px}}@media(max-width:640px){.wrap{width:min(100% - 20px,1280px)}.two,.check-row{grid-template-columns:1fr}.panel{padding:16px}.thumb-title{font-size:20px}}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="top">
      <div><div class="eyebrow">GFIELD INSIGHT STUDIO</div><h1>교육 인사이트<br>제작기</h1><p class="lead">검색한 뉴스와 자료를 붙여넣고, AI가 취합·해석한 결과를 썸네일과 본문 미리보기로 바로 확인합니다.</p></div>
      <nav class="actions"><button class="btn ghost" type="button" onclick="clearDraft()">초기화</button><button class="btn primary" type="button" onclick="generateInsight()">교육 인사이트 생성</button><button class="btn gold" type="button" onclick="preparePost()">게시 준비</button></nav>
    </header>
    <section class="layout">
      <aside class="panel">
        <h2>입력·설정</h2>
        <div class="field"><label>제목</label><input id="title" placeholder="예: AI 시대의 초등 수학 학습 변화"></div>
        <div class="two"><div class="field"><label>카테고리</label><select id="category"><option>교육정책</option><option>입시/진학</option><option>학습법</option><option>에듀테크/AI</option><option>수학·사고력</option><option>학원가 이슈</option></select></div><div class="field"><label>형식</label><select id="tone"><option>인사이트형</option><option>칼럼형</option><option>블로그형</option><option>잡지형</option></select></div></div>
        <div class="field"><label>출처/참고 링크</label><input id="sourceUrl" placeholder="기사, 보고서, 이미지 출처 등"></div>
        <div class="field"><label>썸네일 이미지 URL</label><input id="imageUrl" placeholder="없으면 자동 카드 썸네일 생성"></div>
        <div class="option-box field"><label>추가 옵션</label><div class="check-row"><label class="check"><input id="optImage" type="checkbox" checked> 이미지 제안</label><label class="check"><input id="optTable" type="checkbox" checked> 표/비교표</label><label class="check"><input id="optGraph" type="checkbox"> 그래프 설명</label><label class="check"><input id="optSource" type="checkbox" checked> 출처 정리</label></div></div>
        <div class="field"><label>자료 붙여넣기</label><textarea id="source" class="source" placeholder="구글/뉴스/보고서/블로그에서 찾은 교육 자료를 붙여넣으세요. 여러 자료를 이어 붙여도 됩니다."></textarea></div>
        <div class="row"><button class="btn primary" type="button" onclick="generateInsight()">생성</button><button class="btn" type="button" onclick="makeBasicHtml()">기본 HTML</button></div>
        <p class="hint">제작기는 관리자용 작업실입니다. 공개 페이지에는 노출하지 않습니다.</p>
      </aside>
      <section class="studio">
        <div class="preview-grid">
          <div class="thumb-card"><h2>카드형 썸네일</h2><div class="thumb-preview" id="thumbPreview"><span class="thumb-new" id="newBadge">NEW</span><div class="thumb-inner"><div class="thumb-kicker">GFIELD EDUCATION INSIGHT</div></div><div class="thumb-inner"><div class="thumb-title" id="thumbTitle">교육 인사이트 제목</div><div class="thumb-category" id="thumbCategory">교육정책</div></div></div><p class="hint">게시판 카드에 표시될 16:9 썸네일입니다. 이미지 URL이 없으면 자동 생성됩니다.</p></div>
          <div class="panel" style="box-shadow:none"><h2>본문 미리보기</h2><div class="article-preview" id="preview">미리보기 영역</div></div>
        </div>
        <div class="panel"><div class="tabs"><button class="tab active" id="tabSource" onclick="showPane('source')">HTML 소스</button><button class="tab" id="tabPost" onclick="showPane('post')">게시 데이터</button></div><div class="pane active" id="paneSource"><textarea id="htmlSource" class="code" placeholder="생성된 HTML 소스가 표시됩니다. 여기서 직접 수정할 수 있습니다."></textarea><div class="row" style="margin-top:10px"><button class="btn" onclick="refreshPreview()">미리보기 갱신</button><button class="btn" onclick="copySource()">소스 복사</button><button class="btn" onclick="downloadHtml()">HTML 다운로드</button></div></div><div class="pane" id="panePost"><textarea id="postData" class="code" placeholder="게시 준비 JSON이 표시됩니다."></textarea><div class="row" style="margin-top:10px"><button class="btn" onclick="copyPostData()">게시 데이터 복사</button></div></div><div class="field" style="margin-top:14px"><label>카드 요약</label><textarea id="summary" class="summary" placeholder="공개 게시판 카드에 보일 짧은 요약"></textarea></div></div>
      </section>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <script>
    const API='http://185.238.241.138/api/gemini';
    const $=id=>document.getElementById(id);
    function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
    function msg(t){toast.textContent=t;toast.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove('show'),2200)}
    function optionText(){const a=[];if(optImage.checked)a.push('이미지 제안 최소 2개');if(optTable.checked)a.push('필요 시 표 또는 비교표');if(optGraph.checked)a.push('그래프/도표 설명');if(optSource.checked)a.push('출처 정리');return a.join(', ')}
    function formatText(t){return esc(t).replace(/\[강조\]([\s\S]*?)\[\/강조\]/g,'<mark>$1</mark>').replace(/\n/g,'<br>')}
    function makeArticle(title,body,tone){return `<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(title)}</title><style>body{margin:0;background:#f4f6fb;color:#111827;font-family:Pretendard,Apple SD Gothic Neo,Noto Sans KR,sans-serif}.page{width:min(920px,calc(100% - 28px));margin:auto;padding:44px 0}.article{background:#fff;border-radius:30px;box-shadow:0 22px 70px rgba(15,23,42,.12);overflow:hidden}.hero{padding:42px;background:linear-gradient(135deg,#101a34,#16417c);color:white}.eyebrow{font-size:12px;font-weight:950;letter-spacing:2px;color:#dbeafe}.hero h1{margin:12px 0 12px;font-size:clamp(34px,6vw,64px);line-height:1.02}.tag{display:inline-block;border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:8px 12px;font-weight:900}.body{padding:36px;font-size:17px;line-height:1.9}.body mark{background:#fff2a8;padding:2px 5px;border-radius:6px;font-weight:850}</style></head><body><main class="page"><article class="article"><section class="hero"><div class="eyebrow">GFIELD EDUCATION INSIGHT</div><h1>${esc(title)}</h1><span class="tag">${esc(tone)}</span></section><section class="body">${formatText(body)}</section></article></main></body></html>`}
    function showPane(name){tabSource.classList.toggle('active',name==='source');tabPost.classList.toggle('active',name==='post');paneSource.classList.toggle('active',name==='source');panePost.classList.toggle('active',name==='post')}
    async function generateInsight(){const title=$('title').value.trim()||'교육 인사이트 브리핑';const source=$('source').value.trim();if(!source){msg('자료를 붙여넣어주세요');return}msg('AI가 자료를 취합·해석하는 중');try{const merged=source+'\n\n추가 옵션: '+optionText();const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,tone:$('tone').value,source:merged})});const data=await r.json();if(!data.ok)throw new Error(data.error||'AI 호출 실패');const text=data.text||source;if(!summary.value.trim())summary.value=makeSummary(text);htmlSource.value=makeArticle(title,text,$('tone').value);refreshPreview();updateThumb();msg('생성 완료')}catch(e){msg('AI 호출 실패: '+e.message)}}
    function makeBasicHtml(){const title=$('title').value.trim()||'교육 인사이트 브리핑';const body=$('source').value.trim()||'자료를 입력해주세요.';htmlSource.value=makeArticle(title,body,$('tone').value);if(!summary.value.trim())summary.value=makeSummary(body);refreshPreview();updateThumb();msg('기본 HTML 생성 완료')}
    function refreshPreview(){if(!htmlSource.value.trim()){preview.textContent='미리보기 영역';return}preview.innerHTML='<iframe srcdoc="'+esc(htmlSource.value)+'"></iframe>'}
    function makeSummary(t){return String(t||'').replace(/[#*_`\[\]]/g,'').replace(/\n+/g,' ').slice(0,150)}
    function updateThumb(){const title=$('title').value.trim()||'교육 인사이트 제목';thumbTitle.textContent=title;thumbCategory.textContent=$('category').value;thumbPreview.classList.remove('has-img');thumbPreview.querySelectorAll('img').forEach(x=>x.remove());const url=$('imageUrl').value.trim();if(url){const img=new Image();img.src=url;img.onload=()=>{thumbPreview.prepend(img);thumbPreview.classList.add('has-img')}}}
    function preparePost(){const post={title:$('title').value.trim(),category:$('category').value,tone:$('tone').value,summary:$('summary').value.trim(),imageUrl:$('imageUrl').value.trim(),sourceUrl:$('sourceUrl').value.trim(),html:htmlSource.value,createdAt:new Date().toISOString(),isNew:true};postData.value=JSON.stringify(post,null,2);localStorage.setItem('gfield_pending_post',postData.value);showPane('post');msg('게시 준비 데이터 생성 완료')}
    function copySource(){navigator.clipboard.writeText(htmlSource.value||'');msg('소스 복사 완료')}
    function copyPostData(){navigator.clipboard.writeText(postData.value||'');msg('게시 데이터 복사 완료')}
    function downloadHtml(){const blob=new Blob([htmlSource.value||''],{type:'text/html;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=($('title').value.trim()||'gfield-insight')+'.html';a.click();URL.revokeObjectURL(a.href)}
    function clearDraft(){['title','source','summary','sourceUrl','imageUrl','htmlSource','postData'].forEach(id=>$(id).value='');preview.textContent='미리보기 영역';updateThumb();msg('초기화 완료')}
    ['title','category','imageUrl'].forEach(id=>$(id).addEventListener('input',updateThumb));updateThumb();
  </script>
</body>
</html>
