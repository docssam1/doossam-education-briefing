<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DOCSSAM 교육 브리핑 관리자</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --paper: #ffffff;
      --ink: #111827;
      --muted: #64748b;
      --line: #e5e7eb;
      --brand: #155e75;
      --danger: #dc2626;
      --soft: #ecfeff;
      --shadow: 0 18px 50px rgba(15, 23, 42, .10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 76px;
    }
    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 22px;
      align-items: end;
      padding: 34px 0 26px;
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      font-size: 12px;
      font-weight: 950;
      color: var(--brand);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: clamp(36px, 6vw, 72px);
      line-height: .98;
      letter-spacing: -1.2px;
      font-weight: 950;
    }
    .lead {
      margin: 16px 0 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
      max-width: 700px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn {
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(15, 23, 42, .04);
    }
    .btn.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
    }
    .btn.danger {
      background: #fff1f2;
      border-color: #fecdd3;
      color: var(--danger);
    }
    .layout {
      display: grid;
      grid-template-columns: .9fr 1.1fr;
      gap: 24px;
      margin-top: 28px;
      align-items: start;
    }
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px;
    }
    .panel.sticky {
      position: sticky;
      top: 18px;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 18px;
    }
    .field { margin-bottom: 12px; }
    label {
      display: block;
      margin-bottom: 7px;
      color: #334155;
      font-size: 12px;
      font-weight: 900;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid #d9dee8;
      border-radius: 14px;
      padding: 13px 14px;
      font: inherit;
      color: var(--ink);
      background: #fbfcfd;
      outline: none;
    }
    textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.7;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(21, 94, 117, .10);
      background: white;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
      margin: 10px 0 0;
    }
    .list {
      display: grid;
      gap: 14px;
    }
    .item {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: #fff;
    }
    .item-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .item h3 {
      margin: 0 0 9px;
      line-height: 1.35;
    }
    .item p {
      margin: 0;
      color: #475569;
      line-height: 1.7;
      font-size: 14px;
    }
    .item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .small {
      padding: 9px 13px;
      font-size: 13px;
    }
    .empty {
      padding: 36px 20px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed #cbd5e1;
      border-radius: 22px;
      background: #fff;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: #111827;
      color: white;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 800;
      display: none;
      z-index: 80;
    }
    .toast.show { display: block; }
    @media (max-width: 920px) {
      .top, .layout { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .panel.sticky { position: static; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="top">
      <div>
        <div class="eyebrow">admin console</div>
        <h1>교육 브리핑<br>관리자</h1>
        <p class="lead">게시글 등록과 삭제를 관리합니다. HTML 결과물 저장은 별도 저장소 화면에서 처리합니다.</p>
      </div>
      <nav class="actions">
        <a class="btn" href="./index.html">공개 게시판</a>
        <a class="btn" href="./html-storage.html">HTML 저장소</a>
        <button class="btn primary" type="button" onclick="loadPosts()">새로고침</button>
      </nav>
    </header>

    <section class="layout">
      <aside class="panel sticky">
        <h2>게시글 등록</h2>
        <div class="field">
          <label for="apiUrl">Apps Script URL</label>
          <input id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec">
        </div>
        <div class="field">
          <label for="token">관리자 토큰</label>
          <input id="token" type="password" placeholder="BOARD_WRITE_TOKEN">
        </div>
        <div class="field">
          <label for="title">제목</label>
          <input id="title" placeholder="예: 이번 주 대치동 교육 뉴스">
        </div>
        <div class="field">
          <label for="category">분류</label>
          <select id="category">
            <option>교육 브리핑</option>
            <option>입시 뉴스</option>
            <option>대치동 리포트</option>
            <option>학원가 트렌드</option>
            <option>정책 분석</option>
          </select>
        </div>
        <div class="field">
          <label for="summary">요약</label>
          <textarea id="summary" placeholder="카드에 보일 짧은 요약"></textarea>
        </div>
        <div class="field">
          <label for="body">본문</label>
          <textarea id="body" placeholder="자세히 보기에 들어갈 전체 내용"></textarea>
        </div>
        <div class="field">
          <label for="imageUrl">이미지 URL</label>
          <input id="imageUrl" placeholder="선택 사항">
        </div>
        <div class="field">
          <label for="sourceUrl">출처/자세히 보기 링크</label>
          <input id="sourceUrl" placeholder="선택 사항">
        </div>
        <button class="btn primary" type="button" style="width:100%" onclick="submitPost()">등록하기</button>
        <p class="hint">Apps Script URL과 관리자 토큰은 이 브라우저에만 저장됩니다. 공개 게시판에는 삭제/등록 UI가 보이지 않습니다.</p>
      </aside>

      <section class="panel">
        <h2>게시글 관리</h2>
        <div class="list" id="list"></div>
      </section>
    </section>
  </main>
  <div class="toast" id="toast"></div>

  <script>
    const APPS_SCRIPT_URL = "";
    let posts = [];

    function boot() {
      document.getElementById("apiUrl").value = localStorage.getItem("briefing_api_url") || APPS_SCRIPT_URL || "";
      document.getElementById("token").value = localStorage.getItem("briefing_token") || "";
      loadPosts();
    }

    function getApiUrl() {
      return (document.getElementById("apiUrl").value || localStorage.getItem("briefing_api_url") || APPS_SCRIPT_URL || "").trim();
    }

    function getToken() {
      return (document.getElementById("token").value || localStorage.getItem("briefing_token") || "").trim();
    }

    function loadPosts() {
      const url = getApiUrl();
      if (!url) {
        document.getElementById("list").innerHTML = '<div class="empty">Apps Script URL을 입력하면 게시글 목록이 표시됩니다.</div>';
        return;
      }
      localStorage.setItem("briefing_api_url", url);
      const callback = "adminPostsCallback_" + Date.now();
      window[callback] = function(data) {
        delete window[callback];
        script.remove();
        if (data && data.ok) {
          posts = data.posts || [];
          renderPosts();
        } else {
          showToast("목록을 불러오지 못했습니다");
        }
      };
      const script = document.createElement("script");
      script.src = url + "?action=listPosts&callback=" + callback;
      script.onerror = function() {
        delete window[callback];
        showToast("Apps Script URL을 확인해주세요");
      };
      document.body.appendChild(script);
    }

    function renderPosts() {
      const list = document.getElementById("list");
      if (!posts.length) {
        list.innerHTML = '<div class="empty">아직 등록된 게시글이 없습니다.</div>';
        return;
      }
      list.innerHTML = posts.map(post => [
        '<article class="item">',
        '  <div class="item-meta"><span>' + escapeHtml(post.category || "교육 브리핑") + '</span><span>' + formatDate(post.createdAt) + '</span></div>',
        '  <h3>' + escapeHtml(post.title) + '</h3>',
        '  <p>' + escapeHtml(post.summary || "") + '</p>',
        '  <div class="item-actions">',
        post.htmlFileId ? '    <a class="btn small primary" href="./html-viewer.html?id=' + encodeURIComponent(post.htmlFileId) + '" target="_blank" rel="noopener">HTML 보기</a>' : '',
        post.sourceUrl ? '    <a class="btn small" href="' + escapeAttr(post.sourceUrl) + '" target="_blank" rel="noopener">출처</a>' : '',
        '    <button class="btn small danger" type="button" onclick="deletePost(\\'' + escapeJs(post.id) + '\\')">삭제</button>',
        '  </div>',
        '</article>'
      ].join("")).join("");
    }

    async function submitPost() {
      const url = getApiUrl();
      if (!url) {
        showToast("Apps Script URL을 먼저 입력해주세요");
        return;
      }
      const token = getToken();
      localStorage.setItem("briefing_api_url", url);
      if (token) localStorage.setItem("briefing_token", token);

      const payload = {
        token,
        title: value("title"),
        category: value("category"),
        summary: value("summary"),
        body: value("body"),
        imageUrl: value("imageUrl"),
        sourceUrl: value("sourceUrl")
      };
      if (!payload.title || (!payload.summary && !payload.body)) {
        showToast("제목과 내용을 입력해주세요");
        return;
      }
      await postNoCors(url, payload, "등록 요청을 보냈습니다");
      ["title", "summary", "body", "imageUrl", "sourceUrl"].forEach(id => document.getElementById(id).value = "");
      setTimeout(loadPosts, 1600);
    }

    async function deletePost(id) {
      const url = getApiUrl();
      const token = getToken();
      if (!url || !token) {
        showToast("Apps Script URL과 관리자 토큰이 필요합니다");
        return;
      }
      if (!confirm("이 게시글을 삭제할까요?")) return;
      await postNoCors(url, { action: "deletePost", token, id }, "삭제 요청을 보냈습니다");
      setTimeout(loadPosts, 1600);
    }

    async function postNoCors(url, payload, message) {
      try {
        await fetch(url, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        showToast(message);
      } catch (err) {
        showToast("요청 실패: Apps Script URL을 확인해주세요");
      }
    }

    function value(id) {
      return (document.getElementById(id).value || "").trim();
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleDateString("ko-KR", { month: "short", day: "numeric" });
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    function escapeJs(value) {
      return String(value || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    boot();
  </script>
</body>
</html>
