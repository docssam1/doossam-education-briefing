server {
    listen 80;
    server_name 185.238.241.138 185-238-241-138.nip.io;

    root /var/www/gfield-converter;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/gemini {
        proxy_pass http://127.0.0.1:8788/api/gemini;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/health {
        proxy_pass http://127.0.0.1:8788/api/health;
    }
}
